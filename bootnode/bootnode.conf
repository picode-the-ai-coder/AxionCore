{
  "bootnode": {
    "id": "axion-bootnode-1",
    "version": "1.0.0",
    "description": "Axion Network Bootnode Configuration",
    
    "network": {
      "name": "axion-mainnet",
      "p2p_port": 30303,
      "discovery_port": 30304,
      "rpc_port": 8545,
      "ws_port": 8546,
      "metrics_port": 9090,
      "admin_port": 8551,
      "external_ip": "YOUR_EXTERNAL_IP"
    },
    
    "node": {
      "max_peers": 1000,
      "min_peers": 10,
      "sync_mode": "fast",
      "pruning": false,
      "chain_id": 1
    },
    
    "discovery": {
      "enabled": true,
      "method": "dht",
      "bootstrap_nodes": [
        "enode://axion-bootnode-1@bootnode1.axion.io:30303",
        "enode://axion-bootnode-2@bootnode2.axion.io:30303"
      ],
      "discovery_interval": 30,
      "peer_request_limit": 20
    },
    
    "database": {
      "path": "./data/chaindata",
      "cache_size": 2048,
      "max_size": 500000000,
      "compress": true
    },
    
    "logging": {
      "level": "info",
      "file": "./logs/bootnode.log",
      "max_size": "100MB",
      "max_backups": 5,
      "max_age_days": 30,
      "console_output": true
    },
    
    "metrics": {
      "enabled": true,
      "prometheus_port": 9090,
      "collection_interval": 15,
      "export_interval": 30,
      "metrics_file": "./metrics/prometheus.txt"
    },
    
    "security": {
      "authentication": {
        "method": "signature",
        "verify_signatures": true,
        "whitelist_enabled": false,
        "whitelist": []
      },
      "rate_limiting": {
        "enabled": true,
        "requests_per_minute": 1000,
        "requests_per_peer": 100
      },
      "firewall": {
        "enabled": true,
        "allow_private_ips": true,
        "blacklist": [],
        "whitelist": []
      },
      "tls": {
        "enabled": false,
        "cert_file": "./certs/bootnode.crt",
        "key_file": "./certs/bootnode.key"
      }
    },
    
    "performance": {
      "connection_pool_size": 100,
      "request_timeout_ms": 5000,
      "idle_timeout_ms": 300000,
      "buffer_size": 1048576,
      "compression_enabled": true
    },
    
    "monitoring": {
      "health_check_interval": 60,
      "peer_health_threshold": 0.8,
      "alerts": {
        "low_peer_count": {
          "enabled": true,
          "threshold": 10,
          "action": "notify"
        },
        "high_latency": {
          "enabled": true,
          "threshold_ms": 1000,
          "action": "notify"
        },
        "high_cpu": {
          "enabled": true,
          "threshold_percent": 80,
          "action": "throttle"
        },
        "high_memory": {
          "enabled": true,
          "threshold_percent": 90,
          "action": "cleanup"
        }
      }
    },
    
    "failover": {
      "enabled": true,
      "primary": {
        "hostname": "bootnode1.axion.io",
        "ip": "YOUR_PRIMARY_IP",
        "port": 30303
      },
      "secondary": [
        {
          "hostname": "bootnode2.axion.io",
          "ip": "AWS_IP",
          "port": 30303
        },
        {
          "hostname": "bootnode3.axion.io",
          "ip": "AZURE_IP",
          "port": 30303
        }
      ],
      "health_check_interval": 30,
      "failover_threshold": 3
    },
    
    "features": {
      "rpc_enabled": true,
      "websocket_enabled": true,
      "metrics_enabled": true,
      "admin_interface": true,
      "peer_discovery": true,
      "contract_deployment": false,
      "state_sync": true
    }
  }
}
