version: '3.8'

services:
  bootnode:
    build:
      context: .
      dockerfile: bootnode/Dockerfile
    container_name: axion-bootnode
    image: axion-ide/bootnode:latest
    ports:
      - "30303:30303/tcp"
      - "30303:30303/udp"
      - "30304:30304/udp"
      - "8545:8545/tcp"
      - "8546:8546/tcp"
      - "9090:9090/tcp"
    environment:
      - BOOTNODE_LOG_LEVEL=info
      - BOOTNODE_MAX_PEERS=1000
    volumes:
      - bootnode_data:/app/data
      - bootnode_logs:/app/logs
      - bootnode_metrics:/app/metrics
      - ./bootnode/bootnode.conf:/app/bootnode/bootnode.conf:ro
    restart: unless-stopped
    networks:
      - axion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: axion-prometheus
    ports:
      - "9091:9090/tcp"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - axion-network
    depends_on:
      - bootnode

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: axion-grafana
    ports:
      - "3000:3000/tcp"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - axion-network
    depends_on:
      - prometheus

volumes:
  bootnode_data:
    driver: local
  bootnode_logs:
    driver: local
  bootnode_metrics:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  axion-network:
    driver: bridge
